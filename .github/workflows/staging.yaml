name: Staging Workflow

on:
  push:
    branches:
      - 'release/**'   # Triggers on any branch starting with release/

jobs:
  build-and-deploy:
    name: Lint & Deploy to Staging Environment
    runs-on: ubuntu-latest
    environment: staging-env

    steps:
      # Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Setup Node.js (required for linting)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies
      - name: Install Dependencies
        run: npm install

      # Run HTMLHint on HTML files inside src/
      - name: Run HTMLHint
        run: npx htmlhint "src/**/*.html"

      # Run Stylelint on CSS files inside styles/
      - name: Run Stylelint
        run: npx stylelint "styles/**/*.css"

      # Deploy to GitHub Pages (Staging)
      - name: Deploy to Staging
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src   # Deploys src folder (HTML pages)
          publish_branch: gh-pages-staging  # Branch for staging deployment
          destination_dir: .   # Deploy to root of the branch
