name: Staging Workflow

on:
  push:
    branches:
      - 'release/**'   # Triggers on any branch starting with release/

jobs:
  build-and-deploy:
    name: Lint, Build & Deploy to Staging Environment
    runs-on: ubuntu-latest
    environment: staging-env

    steps:
      # Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies
      - name: Install Dependencies
        run: npm install

      # Run HTMLHint on HTML files inside src/
      - name: Run HTMLHint
        run: npx htmlhint "src/**/*.html"

      # Run Stylelint on CSS files inside styles/
      - name: Run Stylelint
        run: npx stylelint "styles/**/*.css"

      # Build Project with Parcel
      - name: Build Project with Parcel
        run: npx parcel build src/index.html --dist-dir dist

      # Deploy to GitHub Pages (Staging)
      - name: Deploy to Staging
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist   # Built output folder
          publish_branch: gh-pages-staging  # Deployment branch for staging
          destination_dir: .    # Deploy to root directory of gh-pages-staging
